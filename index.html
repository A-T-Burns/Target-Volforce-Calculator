<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sound Voltex Volforce Target Calculator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Sound Voltex Volforce Target Calculator</h1>
<p>Enter a target volforce, then see the minimum score (per song, x50) needed at each level &amp; clear mark.</p>

<div>
  <label for="target">Target Volforce:</label>
  <input type="number" id="target" min="0" step="0.001" value="20">
  <button id="calc">Calculate</button>
</div>

<p id="perSong"></p>

<table id="results">
  <thead>
    <tr>
      <th>Level</th>
      <th>PUC</th>
      <th>UC</th>
      <th>MAX</th>
      <th>EXC</th>
      <th>EFF</th>
      <th>Crash</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="volforce.js"></script>

</body>
</html>
